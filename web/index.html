<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dockwatch</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🐳</text></svg>">
<style>
  :root {
    --bg: #0b0e14;
    --card: #11151f;
    --border: #1e2533;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #38bdf8;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  #conn { font-size: 13px; color: var(--muted); }
  #conn::before { content: "●"; margin-right: 6px; color: var(--gray); }
  #conn.ok::before { color: var(--green); }
  #conn.err::before { color: var(--red); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 4px;
    border-top: 1px solid var(--border);
  }
  .row:first-of-type { border-top: none; }
  .row.ignored { opacity: 0.45; }
  .row .info { flex: 1; min-width: 0; }
  .row .name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; }
  .row .meta { font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    white-space: nowrap;
  }
  .badge.healthy, .badge.running { background: rgba(52,211,153,.12); color: var(--green); }
  .badge.unhealthy { background: rgba(248,113,113,.14); color: var(--red); }
  .badge.starting, .badge.restarting, .badge.paused { background: rgba(251,191,36,.12); color: var(--amber); }
  .badge.exited, .badge.created, .badge.dead { background: rgba(107,114,128,.15); color: var(--gray); }
  .empty { color: var(--muted); padding: 8px 4px; }

  form label { display: block; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
  form input[type="text"], form input[type="password"] {
    display: block; width: 100%;
    margin-top: 5px; padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
  }
  form input:focus { outline: none; border-color: var(--accent); }

  .toggles { display: flex; flex-wrap: wrap; gap: 8px 18px; margin: 16px 0; }
  .toggles label {
    display: flex; align-items: center; gap: 7px;
    margin: 0; color: var(--text); font-size: 14px; cursor: pointer;
  }
  .toggles input { accent-color: var(--accent); width: 15px; height: 15px; }

  .hint {
    background: rgba(251,191,36,.08);
    border: 1px solid rgba(251,191,36,.25);
    color: var(--amber);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13.5px;
    margin-bottom: 16px;
  }
  .hint.hidden { display: none; }

  .actions { display: flex; gap: 10px; margin-top: 4px; }
  button {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--accent);
    color: #04111a;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  button.secondary { background: transparent; color: var(--text); }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: default; }

  footer { text-align: center; color: var(--muted); font-size: 12.5px; margin-top: 8px; }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    transition: transform .25s ease;
    max-width: 90vw;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: rgba(52,211,153,.4); }
  #toast.err { border-color: rgba(248,113,113,.4); }
</style>
</head>
<body>
<main>
  <header>
    <div class="logo">dock<span>watch</span></div>
    <div id="conn">connecting…</div>
  </header>

  <div class="hint hidden" id="topic-hint">
    Set an ntfy topic below to start receiving notifications on your phone.
  </div>

  <section class="card">
    <h2>Containers</h2>
    <div id="list"><div class="empty">Loading…</div></div>
  </section>

  <section class="card">
    <h2>Notifications</h2>
    <form id="settings">
      <label>ntfy server
        <input type="text" name="ntfyServer" placeholder="https://ntfy.sh">
      </label>
      <label>Topic — subscribe to this in the ntfy app
        <input type="text" name="ntfyTopic" placeholder="my-secret-topic-x7q2">
      </label>
      <label>Access token (only for protected servers)
        <input type="password" name="ntfyToken" autocomplete="off" placeholder="tk_...">
      </label>
      <div class="toggles">
        <label><input type="checkbox" name="notifyUnhealthy"> Unhealthy</label>
        <label><input type="checkbox" name="notifyDown"> Crashed</label>
        <label><input type="checkbox" name="notifyRecovered"> Recovered</label>
      </div>
      <label>Ignore containers (comma separated, * wildcard supported)
        <input type="text" name="ignore" placeholder="watchtower, dev-*">
      </label>
      <div class="actions">
        <button type="submit">Save</button>
        <button type="button" class="secondary" id="test">Send test notification</button>
      </div>
    </form>
  </section>

  <footer>dockwatch · watching the local docker daemon · port 9622</footer>
</main>
<div id="toast"></div>

<script>
const $ = s => document.querySelector(s);

async function api(path, opts) {
  const r = await fetch('/api' + path, opts);
  const body = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(body.error || r.statusText);
  return body;
}

let toastTimer;
function toast(msg, ok = true) {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'show ' + (ok ? 'ok' : 'err');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

function badge(c) {
  const cls = c.health || c.state;
  const label = c.health ? (c.state === 'running' ? c.health : c.state) : c.state;
  return `<span class="badge ${cls}">${label}</span>`;
}

function esc(s) {
  return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

async function refresh() {
  try {
    const list = await api('/containers');
    $('#conn').textContent = 'connected';
    $('#conn').className = 'ok';
    if (!list.length) {
      $('#list').innerHTML = '<div class="empty">No containers found.</div>';
      return;
    }
    $('#list').innerHTML = list.map(c => `
      <div class="row ${c.ignored ? 'ignored' : ''}" title="${esc(c.status)}">
        <div class="info">
          <div class="name">${esc(c.name)}</div>
          <div class="meta">${esc(c.image)}</div>
        </div>
        ${badge(c)}
      </div>`).join('');
  } catch (e) {
    $('#conn').textContent = 'docker unreachable';
    $('#conn').className = 'err';
    $('#list').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}

const form = $('#settings');

async function loadConfig() {
  const cfg = await api('/config');
  form.ntfyServer.value = cfg.ntfyServer || '';
  form.ntfyTopic.value = cfg.ntfyTopic || '';
  form.ntfyToken.value = cfg.ntfyToken || '';
  form.notifyUnhealthy.checked = cfg.notifyUnhealthy;
  form.notifyDown.checked = cfg.notifyDown;
  form.notifyRecovered.checked = cfg.notifyRecovered;
  form.ignore.value = (cfg.ignore || []).join(', ');
  $('#topic-hint').classList.toggle('hidden', !!cfg.ntfyTopic);
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  const cfg = {
    ntfyServer: form.ntfyServer.value.trim(),
    ntfyTopic: form.ntfyTopic.value.trim(),
    ntfyToken: form.ntfyToken.value.trim(),
    notifyUnhealthy: form.notifyUnhealthy.checked,
    notifyDown: form.notifyDown.checked,
    notifyRecovered: form.notifyRecovered.checked,
    ignore: form.ignore.value.split(',').map(s => s.trim()).filter(Boolean),
  };
  try {
    await api('/config', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(cfg),
    });
    $('#topic-hint').classList.toggle('hidden', !!cfg.ntfyTopic);
    toast('Settings saved');
    refresh();
  } catch (err) {
    toast(err.message, false);
  }
});

$('#test').addEventListener('click', async () => {
  const btn = $('#test');
  btn.disabled = true;
  try {
    await api('/test', {method: 'POST'});
    toast('Test notification sent — check your phone');
  } catch (err) {
    toast(err.message, false);
  } finally {
    btn.disabled = false;
  }
});

loadConfig().catch(e => toast(e.message, false));
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
